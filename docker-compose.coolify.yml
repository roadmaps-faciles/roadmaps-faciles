# Coolify Docker Compose Build Pack : pull l'image web pré-buildée par GHA depuis GHCR.
# Le routing root domain (roadmaps-faciles.fr) est géré par Coolify via l'UI Domains.
# Le routing wildcard (*.roadmaps-faciles.fr) est géré par un fichier dynamic Traefik
# posé sur le serveur : /data/coolify/proxy/dynamic/rmf-wildcard.yml (cf README docs).
#
# Configuration côté Coolify :
#   - Build Pack : Docker Compose
#   - Compose file path : docker-compose.coolify.yml
#   - Domains : https://roadmaps-faciles.fr (le wildcard est géré hors UI)
#   - Env vars runtime : voir docs/deploy/coolify/README.md pour la liste complète
#   - WEB_IMAGE_TAG : tag GHCR à pull (default chore-coolify-bootstrap, à bumper sur release)

services:
  web:
    image: ghcr.io/roadmaps-faciles/roadmaps-faciles-web:${WEB_IMAGE_TAG:-chore-coolify-bootstrap}
    restart: unless-stopped
    # Expose pour Coolify pose le label loadbalancer.server.port=3000
    expose:
      - "3000"
    networks:
      # Network global Coolify (Postgres, Redis, services managés y sont)
      - coolify
      # Network project Coolify (caddy_ingress_network) : utilisé par Traefik pour reach
      # ce container. Sans, Traefik retourne "no available server".
      - roadmaps-faciles
    # Label Traefik minimal : déclare un service Docker stable `rmf-web@docker` qui sera
    # référencé par le router wildcard du dynamic Traefik file. Coolify pose ses propres
    # labels pour le router root domain en parallèle.
    labels:
      - "traefik.enable=true"
      - "traefik.http.services.rmf-web.loadbalancer.server.port=3000"
    healthcheck:
      # 127.0.0.1 explicite (IPv4) : Next écoute sur 0.0.0.0 (IPv4 only par défaut),
      # `localhost` peut résoudre vers ::1 (IPv6) selon /etc/hosts → "Connection refused".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  coolify:
    external: true
    name: coolify
  roadmaps-faciles:
    external: true
    name: roadmaps-faciles
