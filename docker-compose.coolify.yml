# Coolify Docker Compose Build Pack : pull l'image web pré-buildée par GHA depuis GHCR.
#
# Coolify gère :
#   - Network project + destination (partagé avec Postgres, Redis, etc.)
#   - Labels Traefik pour le router root domain (cf UI Domains : roadmaps-faciles.fr)
#   - Env vars runtime
#
# Le routing wildcard (*.roadmaps-faciles.fr) NE PEUT PAS être géré par Coolify UI :
# Coolify pose un Host(`*.x.fr`) avec tls=true, Traefik génère un HostSNI(`*.x.fr`)
# qui n'accepte PAS les wildcards (limitation Traefik v3). Solution : router wildcard
# défini dans /data/coolify/proxy/dynamic/rmf-wildcard.yml avec HostRegexp qui marche.
#
# Configuration côté Coolify (UI) :
#   - Build Pack : Docker Compose
#   - Compose file path : docker-compose.coolify.yml
#   - Destination : roadmaps-faciles (network partagé)
#   - Domains : https://roadmaps-faciles.fr UNIQUEMENT (pas le wildcard, géré hors UI)
#   - Env vars runtime : voir docs/deploy/coolify/README.md pour la liste complète

services:
  # Service name `rmf-web` = alias DNS auto posé par Docker Compose sur tous les
  # networks où Coolify joint le container (project, destination roadmaps-faciles).
  # Le dynamic Traefik file (cf README) référence simplement http://rmf-web:3000.
  rmf-web:
    image: ghcr.io/roadmaps-faciles/roadmaps-faciles-web:${WEB_IMAGE_TAG:-chore-coolify-bootstrap}
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      # 127.0.0.1 explicite : évite l'ambiguïté IPv4/IPv6 du résolveur `localhost`
      # (le /etc/hosts du container mappe localhost vers 127.0.0.1 ET ::1, Next bind
      # uniquement sur 0.0.0.0 IPv4).
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
