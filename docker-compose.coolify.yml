# Coolify Docker Compose Build Pack : pull l'image web pré-buildée par GHA depuis GHCR.
# Coolify gère automatiquement :
#   - Le network (project Coolify partagé avec Postgres, Redis, etc.)
#   - Les labels Traefik pour le router root domain (cf Domains UI : roadmaps-faciles.fr)
#   - Les env vars runtime
#
# Le routing wildcard (*.roadmaps-faciles.fr) est géré hors compose, dans :
#   /data/coolify/proxy/dynamic/rmf-wildcard.yml (cf README docs/deploy/coolify)
#
# Configuration côté Coolify :
#   - Build Pack : Docker Compose
#   - Compose file path : docker-compose.coolify.yml
#   - Domains : https://roadmaps-faciles.fr (wildcard géré hors UI)
#   - Env vars runtime : voir docs/deploy/coolify/README.md pour la liste complète
#   - WEB_IMAGE_TAG : tag GHCR à pull (default chore-coolify-bootstrap, à bumper sur release)

services:
  web:
    image: ghcr.io/roadmaps-faciles/roadmaps-faciles-web:${WEB_IMAGE_TAG:-chore-coolify-bootstrap}
    restart: unless-stopped
    expose:
      - "3000"
    # Unique label : déclare un service Docker Traefik nommé `rmf-web` (stable, pas
    # dépendant de l'UUID Coolify) référencé dans le dynamic file Traefik pour le
    # router wildcard *.roadmaps-faciles.fr. Coolify pose ses propres labels en
    # parallèle pour le router root domain (Host roadmaps-faciles.fr).
    labels:
      - "traefik.http.services.rmf-web.loadbalancer.server.port=3000"
    healthcheck:
      # 127.0.0.1 explicite (IPv4) : Next écoute sur 0.0.0.0 (IPv4 only par défaut),
      # `localhost` peut résoudre vers ::1 (IPv6) selon /etc/hosts → "Connection refused".
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
