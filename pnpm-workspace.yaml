packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/engines"
  - "@prisma/client"
  - esbuild
  - prisma
  - sharp
  - unrs-resolver
  - next
  - bcrypt
  - protobufjs
  - tailwindcss

overrides:
  "@auth/core": "^0.41.1"
  hono: "^4.11.10"
  "lodash@<4.17.23": "^4.17.23"

ignoreDepScripts: true
childConcurrency: 10
engineStrict: true
autoInstallPeers: false
dedupePeerDependents: true
peerDependencyRules:
  allowedVersions:
    react: "19"
    "react-dom": "19"
