packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@prisma/engines"
  - "@prisma/client"
  - esbuild
  - prisma
  - sharp
  - unrs-resolver
  - next
  - bcrypt
  - protobufjs
  - tailwindcss

overrides:
  "@auth/core": "^0.41.1"
  eslint: "^9"
  hono: "^4.12.25"
  "lodash@<4.17.23": "^4.17.23"
  "@hono/node-server": "^1.19.14"
  "postcss@<8.5.10": "^8.5.10"
  "@babel/core": "^7.29.6"
  "@opentelemetry/core": "^2.8.0"
  dompurify: "^3.4.11"
  esbuild: "^0.28.1"
  js-yaml: "^4.2.0"
  protobufjs: "^7.6.3"
  undici: "^6.27.0"
  vite: "^8.0.16"

ignoreDepScripts: true
childConcurrency: 10
engineStrict: true
autoInstallPeers: false
dedupePeerDependents: true
peerDependencyRules:
  allowedVersions:
    react: "19"
    "react-dom": "19"
allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  argon2: true
  core-js: true
  esbuild: true
  msw: true
  prisma: true
  protobufjs: true
  sharp: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@incubateur-ademe/next-auth-espace-membre-provider@0.3.4'
