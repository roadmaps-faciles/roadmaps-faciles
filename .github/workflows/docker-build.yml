name: Docker build and push

on:
  push:
    branches: [main, dev, "chore/coolify-bootstrap"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR (false = build only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  cancel-in-progress: true
  group: docker-build-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: web
            dockerfile: Dockerfile
            image: roadmaps-faciles-web
            needs_git_crypt: false
          - app: licensing
            dockerfile: Dockerfile.licensing
            image: roadmaps-faciles-licensing
            needs_git_crypt: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unlock git-crypt
        if: matrix.needs_git_crypt
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -
          # Verify decrypt OK
          if ! head -c 8 apps/licensing/prisma.config.ts | grep -q '^import'; then
            echo "ERROR: apps/licensing/prisma.config.ts still encrypted after unlock" >&2
            exit 1
          fi
          echo "OK: git-crypt unlocked, apps/licensing/** in clear"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          # Tags : sha-court + branch + semver tag
          tags: |
            type=sha,format=short,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ matrix.image }}
            org.opencontainers.image.description=Roadmaps Faciles ${{ matrix.app }} image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://roadmaps-faciles.fr
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_BRAND_NAME=Roadmaps Faciles
            NEXT_PUBLIC_TRACKING_PROVIDER=noop
            NEXT_PUBLIC_REPOSITORY_URL=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=docker-${{ matrix.app }}
          cache-to: type=gha,scope=docker-${{ matrix.app }},mode=max
          platforms: linux/amd64
