name: Docker build and push

on:
  push:
    branches: [main, dev, "chore/coolify-bootstrap"]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR (false = build only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

concurrency:
  cancel-in-progress: true
  group: docker-build-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  build:
    name: Build web
    runs-on: ubuntu-latest
    # Note : seul l'image web est buildée ici et push GHCR. L'app licensing reste
    # build par Coolify avec son stage source-decrypt (BuildKit secret GIT_CRYPT_KEY_B64).
    # Raison : éviter d'exposer le code BSL compilé via un registry (même privé).
    env:
      APP: web
      DOCKERFILE: Dockerfile
      IMAGE: roadmaps-faciles-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE }}
          # Tags : sha-court + branch + semver tag
          tags: |
            type=sha,format=short,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE }}
            org.opencontainers.image.description=Roadmaps Faciles ${{ env.APP }} image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ env.APP }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ env.DOCKERFILE }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://roadmaps-faciles.fr
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_BRAND_NAME=Roadmaps Faciles
            NEXT_PUBLIC_TRACKING_PROVIDER=noop
            NEXT_PUBLIC_REPOSITORY_URL=https://github.com/${{ github.repository }}
            SOURCE_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=docker-${{ env.APP }}
          cache-to: type=gha,scope=docker-${{ env.APP }},mode=max
          platforms: linux/amd64
