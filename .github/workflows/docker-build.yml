name: Docker build and push

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      push:
        description: "Push image to GHCR (false = build only)"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  cancel-in-progress: true
  group: docker-build-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Gate prod : sur tag v*, ne build l'image que si Build/Lint/Tests sont verts sur le
  # commit du tag (équivalent de l'ancien ci-gate-release.js du deploy Scalingo). Skippé
  # sur push dev/main et dispatch (staging non gaté, Coolify ne pull qu'en manuel).
  gate:
    name: Verify CI for release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout gate script
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false
      - name: Verify CI workflows passed for tagged commit
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const gate = require('./.github/scripts/ci-gate-release.js');
            await gate({ github, context, core });

  build:
    name: Build web
    needs: [gate]
    # Build si le gate a passé (tag) OU s'il a été skippé (push dev/main, dispatch).
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Note : seul l'image web est buildée ici et push GHCR. L'app licensing reste
    # build par Coolify avec son stage source-decrypt (BuildKit secret GIT_CRYPT_KEY_B64).
    # Raison : éviter d'exposer le code BSL compilé via un registry (même privé).
    env:
      APP: web
      DOCKERFILE: Dockerfile
      IMAGE: roadmaps-faciles-web
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE }}
          # Tags par event :
          #   push main                       → `main`
          #   push dev                        → `dev` + sha-court
          #   push tag v*                     → `v1.2.3` + `1.2.3` + `1.2`
          tags: |
            type=sha,format=short,prefix=,enable=${{ github.ref == 'refs/heads/dev' }}
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE }}
            org.opencontainers.image.description=Roadmaps Faciles ${{ env.APP }} image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push ${{ env.APP }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ env.DOCKERFILE }}
          push: ${{ github.event_name != 'workflow_dispatch' || inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SITE_URL=https://roadmaps-faciles.fr
            NEXT_PUBLIC_APP_ENV=production
            NEXT_PUBLIC_BRAND_NAME=Roadmaps Faciles
            NEXT_PUBLIC_TRACKING_PROVIDER=noop
            NEXT_PUBLIC_REPOSITORY_URL=https://github.com/${{ github.repository }}
            SOURCE_COMMIT=${{ github.sha }}
            IMAGE_REF=${{ github.ref_name }}
          cache-from: type=gha,scope=docker-${{ env.APP }}
          cache-to: type=gha,scope=docker-${{ env.APP }},mode=max
          platforms: linux/amd64
