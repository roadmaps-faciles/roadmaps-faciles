name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      unit: ${{ steps.filter.outputs.test-unit }}
      db: ${{ steps.filter.outputs.test-db }}
      e2e: ${{ steps.filter.outputs.test-e2e }}
      config: ${{ steps.filter.outputs.test-config }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          filters: .github/filters.yml

  unit-tests:
    name: Unit & Integration Tests
    needs: [changes]
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.config == 'true' ||
      needs.changes.outputs.unit == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Unlock git-crypt
        run: |
          sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @roadmaps-faciles/web exec -- prisma generate

      - name: Install Playwright for packages/ui browser tests
        run: pnpm --filter @roadmaps-faciles/ui exec -- playwright install --with-deps chromium

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-test-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-test-${{ runner.os }}-

      - name: Run tests
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            pnpm turbo test -- --coverage --changed "$PR_BASE_SHA"
          else
            pnpm turbo test -- --coverage
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            apps/web/coverage/
            packages/ui/coverage/
          retention-days: 7

  db-tests:
    name: DB Integration Tests
    needs: [changes]
    if: >-
      github.event_name == 'push' ||
      needs.changes.outputs.config == 'true' ||
      needs.changes.outputs.db == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: roadmaps-faciles-test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roadmaps-faciles-test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/roadmaps-faciles-test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Unlock git-crypt
        run: |
          sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @roadmaps-faciles/web exec -- prisma generate

      - run: pnpm --filter @roadmaps-faciles/web exec -- prisma migrate deploy

      - run: pnpm --filter @roadmaps-faciles/web test:db

  e2e-tests:
    name: E2E Tests
    needs: [changes]
    if: >-
      needs.changes.outputs.config == 'true' ||
      needs.changes.outputs.e2e == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: roadmaps-faciles
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      maildev:
        image: maildev/maildev
        ports:
          - 1025:1025
          - 1080:1080
        options: >-
          --health-cmd "wget -q --spider http://localhost:1080/email || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/roadmaps-faciles
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ESPACE_MEMBRE_API_KEY: fakesecret
      MAILER_SMTP_HOST: localhost
      MAILER_SMTP_PORT: 1025
      MAILER_SMTP_SSL: false
      MAILER_FROM_EMAIL: "Roadmaps Faciles <noreply@test.local>"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Unlock git-crypt
        run: |
          sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @roadmaps-faciles/web exec -- sh -c "pnpm prisma generate && pnpm prisma migrate deploy"

      - run: pnpm --filter @roadmaps-faciles/web run run-script -- prisma/test-seed.ts

      - run: pnpm --filter @roadmaps-faciles/web exec -- playwright install --with-deps chromium

      - run: pnpm --filter @roadmaps-faciles/web test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
