name: Deploy

on:
  # Staging: triggered when any CI workflow completes on dev
  # workflow_run fires ONCE per completed workflow - the resolve job checks ALL three passed
  workflow_run:
    workflows: [Build, Lint, Tests]
    types: [completed]
    branches: [dev]

  # Production: triggered when release-please publishes a GitHub Release
  release:
    types: [published]

  # Manual trigger for both environments
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
        default: staging

permissions:
  contents: read
  actions: read

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.event_name == 'release' && 'production') || 'staging' }}
  # true = cancel queued (not in-flight) duplicates from workflow_run triple-trigger
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────
  # Resolve target environment & verify CI status
  # ─────────────────────────────────────────────────
  resolve:
    name: Resolve environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      web_app_name: ${{ steps.resolve.outputs.web_app_name }}
      licensing_app_name: ${{ steps.resolve.outputs.licensing_app_name }}
      ref: ${{ steps.resolve.outputs.ref }}
      should_deploy: ${{ steps.resolve.outputs.should_deploy }}
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Resolve deployment target
        id: resolve
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          SCALINGO_APP_WEB_PRODUCTION: ${{ vars.SCALINGO_APP_WEB_PRODUCTION }}
          SCALINGO_APP_WEB_STAGING: ${{ vars.SCALINGO_APP_WEB_STAGING }}
          SCALINGO_APP_LICENSING_PRODUCTION: ${{ vars.SCALINGO_APP_LICENSING_PRODUCTION }}
        with:
          script: |
            const script = require('./.github/scripts/resolve-deploy.js');
            await script({
              github, context, core,
              dispatchEnvironment: '${{ github.event.inputs.environment }}',
            });

  # ─────────────────────────────────────────────────
  # CI gate for releases (verify CI passed on tag commit)
  # ─────────────────────────────────────────────────
  ci-gate:
    name: Verify CI for release
    needs: [resolve]
    if: needs.resolve.outputs.should_deploy == 'true' && github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scripts
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Check CI workflows passed for release commit
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const script = require('./.github/scripts/ci-gate-release.js');
            await script({
              github, context, core,
              tag: '${{ needs.resolve.outputs.ref }}',
            });

  # ─────────────────────────────────────────────────
  # Deploy to Scalingo
  # ─────────────────────────────────────────────────
  # Deploy web (staging + production)
  # ─────────────────────────────────────────────────
  deploy-web:
    name: Deploy web to ${{ needs.resolve.outputs.environment }}
    needs: [resolve, ci-gate]
    if: >-
      always() &&
      needs.resolve.outputs.should_deploy == 'true' &&
      needs.resolve.result == 'success' &&
      (needs.ci-gate.result == 'success' || needs.ci-gate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: ${{ needs.resolve.outputs.environment }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Setup Scalingo CLI
        uses: scalingo-community/setup-scalingo@87fe86eedc708ffb9d232c756b21f6a5784f6c8a # v0.1.1
        with:
          region: osc-fr1
          api_token: ${{ secrets.SCALINGO_API_TOKEN }}
          app_name: ${{ needs.resolve.outputs.web_app_name }}

      - name: Setup ephemeral SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/scalingo-deploy -N "" -q
          scalingo keys-add "ci-deploy-${{ github.run_id }}-web" ~/.ssh/scalingo-deploy.pub
          ssh-keyscan ssh.osc-fr1.scalingo.com >> ~/.ssh/known_hosts 2>/dev/null
          printf "Host ssh.osc-fr1.scalingo.com\n  IdentityFile ~/.ssh/scalingo-deploy\n" >> ~/.ssh/config

      - name: Unlock git-crypt
        run: |
          sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - name: Create decrypted deploy commit
        run: |
          git add -A
          git -c user.name="ci-deploy" -c user.email="ci@deploy" commit -m "deploy: decrypted" --allow-empty

      - name: Deploy to Scalingo
        run: |
          echo "Deploying web to $APP_NAME"
          echo "Ref: $REF"
          echo "---"
          git remote add scalingo-web "git@ssh.osc-fr1.scalingo.com:$APP_NAME.git"
          git push scalingo-web HEAD:refs/heads/master --force
        env:
          APP_NAME: ${{ needs.resolve.outputs.web_app_name }}
          REF: ${{ needs.resolve.outputs.ref }}

      - name: Cleanup ephemeral SSH key
        if: always()
        run: scalingo keys-remove "ci-deploy-${{ github.run_id }}-web"

  # ─────────────────────────────────────────────────
  # Deploy licensing (production only)
  # ─────────────────────────────────────────────────
  deploy-licensing:
    name: Deploy licensing to production
    needs: [resolve, ci-gate]
    if: >-
      always() &&
      needs.resolve.outputs.should_deploy == 'true' &&
      needs.resolve.result == 'success' &&
      needs.resolve.outputs.environment == 'production' &&
      needs.resolve.outputs.licensing_app_name != '' &&
      (needs.ci-gate.result == 'success' || needs.ci-gate.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.ref }}
          fetch-depth: 0

      - name: Setup Scalingo CLI
        uses: scalingo-community/setup-scalingo@87fe86eedc708ffb9d232c756b21f6a5784f6c8a # v0.1.1
        with:
          region: osc-fr1
          api_token: ${{ secrets.SCALINGO_API_TOKEN }}
          app_name: ${{ needs.resolve.outputs.licensing_app_name }}

      - name: Setup ephemeral SSH key
        run: |
          mkdir -p ~/.ssh
          ssh-keygen -t ed25519 -f ~/.ssh/scalingo-deploy -N "" -q
          scalingo keys-add "ci-deploy-${{ github.run_id }}-licensing" ~/.ssh/scalingo-deploy.pub
          ssh-keyscan ssh.osc-fr1.scalingo.com >> ~/.ssh/known_hosts 2>/dev/null
          printf "Host ssh.osc-fr1.scalingo.com\n  IdentityFile ~/.ssh/scalingo-deploy\n" >> ~/.ssh/config

      - name: Unlock git-crypt
        run: |
          sudo apt-get install -y git-crypt
          echo "$GIT_CRYPT_KEY" | base64 -d | git-crypt unlock -
        env:
          GIT_CRYPT_KEY: ${{ secrets.GIT_CRYPT_KEY }}

      - name: Create decrypted deploy commit with licensing Procfile
        run: |
          cp Procfile.licensing Procfile
          git add -A
          git -c user.name="ci-deploy" -c user.email="ci@deploy" commit -m "deploy: decrypted + licensing procfile"

      - name: Deploy to Scalingo
        run: |
          echo "Deploying licensing to $APP_NAME"
          echo "Ref: $REF"
          echo "---"
          git remote add scalingo-licensing "git@ssh.osc-fr1.scalingo.com:$APP_NAME.git"
          git push scalingo-licensing HEAD:refs/heads/master --force
        env:
          APP_NAME: ${{ needs.resolve.outputs.licensing_app_name }}
          REF: ${{ needs.resolve.outputs.ref }}

      - name: Cleanup ephemeral SSH key
        if: always()
        run: scalingo keys-remove "ci-deploy-${{ github.run_id }}-licensing"
